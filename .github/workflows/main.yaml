name: IngoOutgo CI

on:
  push:
    branches: [f/deploy-action]
  pull_request:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [19.x]

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v3
        with:
          node-version: ${{matrix.node-version}}
      - run: yarn
      - run: yarn build
      - run: yarn run test
      - run: yarn workspace @ingooutgo/react-example run deploy

  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v3
      - name: Setup Pages 📄
        uses: actions/configure-pages@v3
      - name: Build 🏗
        run: yarn run build && yarn workspace @ingooutgo/react-example run deploy
      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v1
        with:
          # Upload entire repository
          path: "examples/react-examples/build"
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v1
